# Starship Prompt Configuration
# Fast, minimal, informative

# Don't add blank line before prompt
add_newline = false

# Allow custom commands enough time for git lookups
command_timeout = 1000

# Prompt format - show only what matters
format = """
$nodejs\
$python\
$rust\
${custom.gituser}\
${custom.dir_link_open}\
$directory\
${custom.dir_link_close}\
${custom.gh_branch}\
$git_status\
$cmd_duration\
$character"""

# Right prompt (optional - uncomment if you want time on the right)
# right_format = "$time"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
read_only = " "

# Git user - shows [handle (local)] or [handle (global)] in git directories
[custom.gituser]
command = "local_user=$(git config --local github.user 2>/dev/null); if [ -n \"$local_user\" ]; then echo \"$local_user\"; else global_user=$(git config --global github.user 2>/dev/null); if [ -n \"$global_user\" ]; then echo \"$global_user\"; fi; fi"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = '[\[$output\]]($style) '
style = "bold blue"

[git_branch]
disabled = true

# Directory hyperlink - wraps $directory in an OSC 8 link to the GitHub repo URL
# Only outputs the opening tag; dir_link_close handles the closing tag
[custom.dir_link_open]
command = "$DOTFILES/terminal/prompt-hyperlinks.sh dir-open"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "$output"

# Closes the OSC 8 hyperlink opened by dir_link_open
[custom.dir_link_close]
command = "printf '\\033]8;;\\033\\\\'"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "$output"

# Branch with clickable GitHub hyperlink (CMD+Click opens /tree/<branch>)
[custom.gh_branch]
command = "$DOTFILES/terminal/prompt-hyperlinks.sh branch"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "$output"

[git_status]
format = '($all_status$ahead_behind )'
# Semantic colors: green=ready, yellow=attention, blue=info, red=urgent
staged = '[+$count](bold green)'
modified = '[!$count](bold yellow)'
untracked = '[?$count](bold blue)'
deleted = '[✘$count](bold red)'
renamed = '[»$count](bold purple)'
conflicted = '[=$count](bold red)'
stashed = '[\$$count](bold cyan)'
ahead = '[⇡$count](bold green)'
behind = '[⇣$count](bold yellow)'
diverged = '[⇕⇡$ahead_count⇣$behind_count](bold red)'

[cmd_duration]
min_time = 2_000  # Show if command took > 2 seconds
format = "[$duration]($style) "
style = "bold yellow"

[nodejs]
format = "[$symbol]( $style)"
symbol = "⬢ "
style = "bold green"
detect_files = ["package.json", ".nvmrc", ".node-version"]
detect_folders = ["node_modules"]

[python]
format = '[${symbol}( \($virtualenv\) )]($style)'
symbol = "🐍 "
style = "bold yellow"
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", "Pipfile", ".python-version"]

[rust]
format = "[$symbol( )]($style)"
symbol = "🦀 "
style = "bold red"

[package]
disabled = true  # Disable package version (slow)

[time]
disabled = true  # Enable if you want time in right prompt
format = "[$time]($style) "
style = "bold dimmed white"
